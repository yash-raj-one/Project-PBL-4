<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Weather App</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://kit.fontawesome.com/95a02bd20d.js"></script>
</head>

<body>

  <div class="card">

    <div class="search">

      <input type="text" id="city" placeholder="Enter city name">

      <button onclick="getWeather()">🔍
        <i class="fa-solid fa-magnifying-glass"></i>
      </button>

    </div>

    <div class="weather">

      <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png"
        class="weather-icon">

      <h1 class="temp">22°C</h1>

      <h2 class="city">New York</h2>

      <div class="details">

        <div class="col">
          <img src="https://cdn-icons-png.flaticon.com/512/728/728093.png">

          <div>
            <p class="humidity">50%</p>
            <p>Humidity</p>
          </div>
        </div>

        <div class="col">
          <img src="https://cdn-icons-png.flaticon.com/512/553/553416.png">

          <div>
            <p class="wind">15 km/h</p>
            <p>Wind Speed</p>
          </div>
        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
